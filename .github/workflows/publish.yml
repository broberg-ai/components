name: publish

# Publishes @broberg/* packages to npm via OIDC Trusted Publishing — NO token/secret.
# One tag prefix per package:
#   • theme-v*        → packages/theme        → @broberg/theme
#   • secret-scan-v*  → packages/secret-scan  → @broberg/secret-scan
#   • lens-v*         → packages/lens         → @broberg/lens
#
# Each package has its own Trusted Publisher entry at npmjs.com → <pkg> → Trusted Publisher =
#   repository: broberg-ai/components · workflow: publish.yml · environment: (empty)
# npm matches on repo + workflow filename, so ALL @broberg/* publishes live in THIS file —
# add a parallel job + a tag prefix for each new package. v0.1.0 of each package is
# bootstrapped by hand (npm has no "pending publisher"); every publish after that runs here
# with zero secrets (OIDC + provenance). Each job only runs for its own tag prefix.
on:
  push:
    tags:
      - "theme-v*"
      - "secret-scan-v*"
      - "lens-v*"
  workflow_dispatch:

jobs:
  publish-theme:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/theme-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # lets GitHub mint the OIDC token npm exchanges for publish
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # pnpm version comes from root package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # resolves to >=22.14, required by OIDC publishing
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm CLI >= 11.5.1; node 22 still ships 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/theme
        run: pnpm typecheck

      - name: Build
        working-directory: packages/theme
        run: pnpm build

      - name: Test
        working-directory: packages/theme
        run: pnpm test

      - name: Guard — tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/theme-v')
        working-directory: packages/theme
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#theme-v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag theme-v$TAG does not match packages/theme version $PKG"
            exit 1
          fi

      - name: Guard — version not already on npm
        working-directory: packages/theme
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@broberg/theme@$PKG" version >/dev/null 2>&1; then
            echo "::error::@broberg/theme@$PKG already published — bump the version first."
            exit 1
          fi
          echo "Publishing @broberg/theme@$PKG"

      # npm (not pnpm) does the OIDC token exchange + provenance. No NODE_AUTH_TOKEN.
      - name: Publish (OIDC)
        working-directory: packages/theme
        run: npm publish --access public --provenance

  publish-secret-scan:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/secret-scan-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # lets GitHub mint the OIDC token npm exchanges for publish
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # pnpm version comes from root package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # resolves to >=22.14, required by OIDC publishing
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm CLI >= 11.5.1; node 22 still ships 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/secret-scan
        run: pnpm typecheck

      - name: Build
        working-directory: packages/secret-scan
        run: pnpm build

      - name: Test
        working-directory: packages/secret-scan
        run: pnpm test

      - name: Guard — tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/secret-scan-v')
        working-directory: packages/secret-scan
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#secret-scan-v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag secret-scan-v$TAG does not match packages/secret-scan version $PKG"
            exit 1
          fi

      - name: Guard — version not already on npm
        working-directory: packages/secret-scan
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@broberg/secret-scan@$PKG" version >/dev/null 2>&1; then
            echo "::error::@broberg/secret-scan@$PKG already published — bump the version first."
            exit 1
          fi
          echo "Publishing @broberg/secret-scan@$PKG"

      # npm (not pnpm) does the OIDC token exchange + provenance. No NODE_AUTH_TOKEN.
      - name: Publish (OIDC)
        working-directory: packages/secret-scan
        run: npm publish --access public --provenance

  publish-lens:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/lens-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # lets GitHub mint the OIDC token npm exchanges for publish
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # pnpm version comes from root package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # resolves to >=22.14, required by OIDC publishing
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm CLI >= 11.5.1; node 22 still ships 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/lens
        run: pnpm typecheck

      - name: Build
        working-directory: packages/lens
        run: pnpm build

      - name: Test
        working-directory: packages/lens
        run: pnpm test

      - name: Guard — tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/lens-v')
        working-directory: packages/lens
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#lens-v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag lens-v$TAG does not match packages/lens version $PKG"
            exit 1
          fi

      - name: Guard — version not already on npm
        working-directory: packages/lens
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@broberg/lens@$PKG" version >/dev/null 2>&1; then
            echo "::error::@broberg/lens@$PKG already published — bump the version first."
            exit 1
          fi
          echo "Publishing @broberg/lens@$PKG"

      # npm (not pnpm) does the OIDC token exchange + provenance. No NODE_AUTH_TOKEN.
      - name: Publish (OIDC)
        working-directory: packages/lens
        run: npm publish --access public --provenance
